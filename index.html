<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>YESHMIYEK</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #050a06;
  font-family: 'Inter', sans-serif;
  -webkit-user-select: none;
  touch-action: none;
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100svh;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background: radial-gradient(ellipse 80% 80% at 50% 50%, #0d1a0e 0%, #040804 100%);
  z-index: 0;
}

#ipod {
  position: relative;
  z-index: 1;
  width: min(82vw, 44svh);
  filter: drop-shadow(0 5vw 10vw rgba(0,0,0,0.95));
}

#shell {
  background: linear-gradient(160deg, #1a2e1c 0%, #111e12 40%, #0a1409 100%);
  padding: 4% 4% 6%;
  box-shadow: inset 0 1px 0 rgba(100,200,80,0.06), inset 0 -1px 0 rgba(0,0,0,0.5);
}

#screen-surround {
  background: #040804;
  padding: 1.8%;
  margin-bottom: 5%;
  box-shadow: inset 0 2px 6px rgba(0,0,0,0.95);
}

#screen {
  position: relative;
  width: 100%;
  aspect-ratio: 1;
  background: #000;
  overflow: hidden;
}

#idle {
  position: absolute; inset: 0;
  display: flex;
  z-index: 3;
  transition: opacity 0.4s;
}
#idle.gone { opacity: 0; pointer-events: none; }

.ml { flex: 1; background: #e8f0e8; display: flex; flex-direction: column; }

.mh {
  background: linear-gradient(180deg, #5599dd, #3377bb);
  padding: 6% 8%;
  display: flex; justify-content: space-between; align-items: center;
  flex-shrink: 0;
}
.mh-t { font-size: clamp(10px,3.5vw,18px); font-weight:500; color:#fff; }
.mh-i { font-size: clamp(8px,2.5vw,13px); color:rgba(255,255,255,0.8); }

.mi {
  flex: 1; padding: 5% 8%;
  font-size: clamp(9px,3vw,15px);
  color: #1a3a1a;
  border-bottom: 1px solid rgba(0,80,0,0.08);
  display: flex; justify-content: space-between; align-items: center;
  background: #e8f0e8;
}
.mi.on { background: linear-gradient(90deg,#3a8a22,#2d7a1a); color:#fff; }
.mi .ar { opacity:0.4; }

.aa {
  width: 42%; flex-shrink: 0;
  background: linear-gradient(180deg, #88bbff 0%, #5599dd 25%, #aaddaa 50%, #4aaa22 72%, #1a4a0e 100%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-end;
  padding: 8%; position: relative; overflow: hidden;
}
.aa::before {
  content: '';
  position: absolute; top:10%; left:8%; right:8%; height:28%;
  background: radial-gradient(ellipse 80% 60% at 50% 50%, rgba(255,255,255,0.5) 0%, transparent 70%);
  border-radius: 50%;
}
.aa-l { font-size: clamp(6px,1.8vw,10px); letter-spacing:.15em; text-transform:uppercase; color:rgba(255,255,255,0.7); text-align:center; position:relative; z-index:1; line-height:2; }
.aa-n { font-size: clamp(7px,2vw,12px); letter-spacing:.12em; text-transform:uppercase; color:#fff; font-weight:500; position:relative; z-index:1; text-shadow:0 1px 4px rgba(0,0,0,0.6); }

#vid {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  display: none;
  z-index: 1;
}
#vid.on { display: block; }

#npbar {
  position: absolute; top:0; left:0; right:0;
  z-index: 2;
  background: rgba(0,10,0,0.65);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  padding: 3% 4%;
  display: flex; justify-content: space-between; align-items: center;
  opacity: 0; transition: opacity 0.4s;
  pointer-events: none;
}
#npbar.on { opacity: 1; }
.np-l { font-size: clamp(7px,2vw,11px); letter-spacing:.2em; text-transform:uppercase; color:rgba(100,220,100,0.75); }
#np-n { font-size: clamp(7px,2vw,11px); color:rgba(200,240,200,0.85); max-width:55%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

#hint {
  position: absolute; inset: 0; z-index: 4;
  display: none;
  align-items: center; justify-content: center;
  background: rgba(0,0,0,0.35);
}
#hint.on { display: flex; }
#hint span { font-size: clamp(9px,2.5vw,13px); letter-spacing:.3em; text-transform:uppercase; color:rgba(100,220,100,0.9); }

#ww { display:flex; align-items:center; justify-content:center; padding:0 12%; }
#wh { position:relative; width:100%; aspect-ratio:1; }

#wr {
  width:100%; height:100%; border-radius:50%;
  background: radial-gradient(circle at 38% 32%, #1e2e1e 0%, #111a11 55%, #0a100a 100%);
  box-shadow: 0 4px 14px rgba(0,0,0,0.85), inset 0 1px 0 rgba(100,200,80,0.06);
  position: relative;
}

.wl { position:absolute; font-size: clamp(6px,1.8vw,10px); letter-spacing:.08em; text-transform:uppercase; color: rgba(100,180,255,0.4); }
.wl.t { top:7%;    left:50%; transform:translateX(-50%); }
.wl.l { left:7%;   top:50%;  transform:translateY(-50%); font-size:clamp(8px,2.5vw,15px); }
.wl.r { right:7%;  top:50%;  transform:translateY(-50%); font-size:clamp(8px,2.5vw,15px); }
.wl.b { bottom:7%; left:50%; transform:translateX(-50%); font-size:clamp(7px,2vw,13px); }

#wc {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  width:38%; height:38%; border-radius:50%;
  background: radial-gradient(circle at 40% 35%, #1a2a1a 0%, #0d140d 100%);
  box-shadow: 0 2px 6px rgba(0,0,0,0.7);
  cursor: pointer;
}

#nt { text-align:center; margin-top:4%; font-size: clamp(7px,1.8vw,12px); letter-spacing:.45em; text-transform:uppercase; color: rgba(80,180,60,0.22); font-weight:300; }

#fi { position:absolute; opacity:0; width:1px; height:1px; }
</style>
</head>
<body>

<input type="file" id="fi" accept="video/*">

<div id="ipod">
  <div id="shell">
    <div id="screen-surround">
      <div id="screen">

        <div id="idle">
          <div class="ml">
            <div class="mh">
              <span class="mh-t">iPod</span>
              <span class="mh-i" style="display:flex;align-items:center;gap:3px;">
                <svg viewBox="0 0 8 10" style="width:8px;opacity:0.8;" fill="white"><polygon points="0,0 8,5 0,10"/></svg>
                <svg viewBox="0 0 8 10" style="width:7px;opacity:0.7;" fill="white"><rect x="0" y="0" width="3" height="10" rx="0.5"/><rect x="5" y="0" width="3" height="10" rx="0.5"/></svg>
                <svg viewBox="0 0 3 10" style="width:3px;opacity:0.5;" fill="white"><rect x="0" y="0" width="3" height="10" rx="0.5"/></svg>
                <svg viewBox="0 0 3 10" style="width:3px;opacity:0.4;" fill="white"><rect x="0" y="0" width="3" height="10" rx="0.5"/></svg>
                <svg viewBox="0 0 3 10" style="width:3px;opacity:0.3;" fill="white"><rect x="0" y="0" width="3" height="10" rx="0.5"/></svg>
              </span>
            </div>
            <div class="mi on"><span>Music</span><span class="ar">›</span></div>
            <div class="mi"><span>Videos</span><span class="ar">›</span></div>
            <div class="mi"><span>Photos</span><span class="ar">›</span></div>
            <div class="mi"><span>Podcasts</span><span class="ar">›</span></div>
            <div class="mi"><span>Settings</span><span class="ar">›</span></div>
            <div class="mi"><span>Now Playing</span><span class="ar">›</span></div>
          </div>
          <div class="aa">
            <div class="aa-l">tap to load</div>
            <div class="aa-n">yeshmiyek</div>
          </div>
        </div>

        <video id="vid" playsinline webkit-playsinline loop></video>

        <div id="npbar">
          <span class="np-l">now playing</span>
          <span id="np-n">—</span>
        </div>

        <div id="hint">
          <span style="display:flex;align-items:center;gap:8px;">
            <svg viewBox="0 0 10 14" style="width:clamp(8px,2.5vw,12px);" fill="rgba(100,220,100,0.9)"><polygon points="0,0 10,7 0,14"/></svg>
            <span style="font-size:clamp(9px,2.5vw,13px);letter-spacing:.3em;text-transform:uppercase;color:rgba(100,220,100,0.9);">tap to play</span>
          </span>
        </div>

      </div>
    </div>

    <div id="ww">
      <div id="wh">
        <div id="wr">
          <!-- MENU — text label, no emoji -->
          <span class="wl t">menu</span>

          <!-- PREV — two left triangles -->
          <span class="wl l">
            <svg viewBox="0 0 22 14" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:clamp(10px,3.5vw,18px);display:block;">
              <rect x="0" y="0" width="2.5" height="14" fill="rgba(100,180,255,0.45)" rx="1"/>
              <polygon points="11,0 2.5,7 11,14" fill="rgba(100,180,255,0.45)"/>
              <polygon points="21,0 12.5,7 21,14" fill="rgba(100,180,255,0.45)"/>
            </svg>
          </span>

          <!-- NEXT — two right triangles -->
          <span class="wl r">
            <svg viewBox="0 0 22 14" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:clamp(10px,3.5vw,18px);display:block;">
              <polygon points="0,0 8.5,7 0,14" fill="rgba(100,180,255,0.45)"/>
              <polygon points="10,0 18.5,7 10,14" fill="rgba(100,180,255,0.45)"/>
              <rect x="19.5" y="0" width="2.5" height="14" fill="rgba(100,180,255,0.45)" rx="1"/>
            </svg>
          </span>

          <!-- PLAY/PAUSE — triangle + two bars -->
          <span class="wl b" style="display:flex;align-items:center;gap:clamp(2px,0.8vw,4px);">
            <svg viewBox="0 0 10 14" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:clamp(7px,2.2vw,11px);display:block;">
              <polygon points="0,0 10,7 0,14" fill="rgba(100,180,255,0.45)"/>
            </svg>
            <svg viewBox="0 0 10 14" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:clamp(7px,2.2vw,11px);display:block;">
              <rect x="0" y="0" width="3.5" height="14" fill="rgba(100,180,255,0.45)" rx="1"/>
              <rect x="6.5" y="0" width="3.5" height="14" fill="rgba(100,180,255,0.45)" rx="1"/>
            </svg>
          </span>
        </div>
        <div id="wc"></div>
      </div>
    </div>

    <div id="nt">yeshmiyek</div>
  </div>
</div>

<script>
const fi    = document.getElementById('fi');
const vid   = document.getElementById('vid');
const idle  = document.getElementById('idle');
const npbar = document.getElementById('npbar');
const npn   = document.getElementById('np-n');
const wc    = document.getElementById('wc');
const hint  = document.getElementById('hint');
const scr   = document.getElementById('screen');

function loadVideo(file) {
  // Revoke any previous object URL
  if (vid._objUrl) URL.revokeObjectURL(vid._objUrl);
  const url = URL.createObjectURL(file);
  vid._objUrl = url;

  vid.src = url;
  npn.textContent = file.name.replace(/\.[^.]+$/, '');
  vid.classList.add('on');
  idle.classList.add('gone');
  npbar.classList.add('on');
  hint.classList.remove('on');

  vid.play().then(() => {
    hint.classList.remove('on');
  }).catch(() => {
    hint.classList.add('on');
  });
}

fi.addEventListener('change', function() {
  const f = this.files && this.files[0];
  if (f) loadVideo(f);
  // Reset so same file can be picked again
  this.value = '';
});

// Tap idle to open picker
idle.addEventListener('click', () => fi.click());

// Toggle play/pause
function toggle() {
  if (!vid.src) return;
  hint.classList.remove('on');
  if (vid.paused) {
    vid.play().catch(() => hint.classList.add('on'));
  } else {
    vid.pause();
  }
}

wc.addEventListener('click', toggle);

scr.addEventListener('click', function(e) {
  if (!idle.classList.contains('gone')) return; // let idle handle its own click
  toggle();
});

document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
</script>
</body>
</html>
